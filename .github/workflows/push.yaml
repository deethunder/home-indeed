name: Push
run-name: ${{ github.ref_name }} push run 🚀
on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - '*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check-format:
    name: Check Formatting 🔍
    if: github.ref_name == 'master' || github.ref_name == 'main'
    uses: ./.github/workflows/check-format.yaml
    permissions:
      contents: read

  build-project:
    name: Build Project 🧱
    uses: ./.github/workflows/build-project.yaml
    secrets: inherit
    permissions:
      contents: read

  create-release:
    name: Create Release 🛫
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    needs: build-project
    defaults:
      run:
        shell: bash
    steps:
      - name: Check Release Tag ☑️
        id: check
        run: |
          : Check Release Tag ☑️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          if [[ "${GITHUB_REF_NAME}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo 'validTag=true' >> $GITHUB_OUTPUT
            echo 'prerelease=false' >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-(beta|rc)[0-9]*$ ]]; then
            echo 'validTag=true' >> $GITHUB_OUTPUT
            echo 'prerelease=true' >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo 'validTag=false' >> $GITHUB_OUTPUT
            echo "::notice::Tag '${GITHUB_REF_NAME}' is not a release tag. Expected 1.0.0, v1.0.0, 1.0.0-beta1, or v1.0.0-beta1."
          fi

      - name: Download Build Artifacts 📥
        uses: actions/download-artifact@v5
        if: fromJSON(steps.check.outputs.validTag)
        with:
          pattern: '*'
          merge-multiple: true

      - name: Verify Release Assets ☑️
        id: assets
        if: fromJSON(steps.check.outputs.validTag)
        run: |
          : Verify Release Assets ☑️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          shopt -s nullglob

          release_files=(
            "${{ github.workspace }}"/*.exe
            "${{ github.workspace }}"/*.zip
            "${{ github.workspace }}"/*.pkg
            "${{ github.workspace }}"/*.deb
            "${{ github.workspace }}"/*.ddeb
            "${{ github.workspace }}"/*.tar.xz
          )

          if (( ${#release_files[@]} == 0 )); then
            echo "::error::No release assets were downloaded from the build jobs. Refusing to create a source-code-only release."
            exit 1
          fi

          printf '%s\n' "${release_files[@]}" > "${{ github.workspace }}/release-assets.txt"
          {
            echo 'files<<EOF'
            printf '%s\n' "${release_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          printf 'Found %s release asset(s):\n' "${#release_files[@]}"
          printf '  %s\n' "${release_files[@]##*/}"

      - name: Generate Checksums 🪪
        if: fromJSON(steps.check.outputs.validTag)
        run: |
          : Generate Checksums 🪪
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          echo "### Checksums" > ${{ github.workspace }}/CHECKSUMS.txt
          while IFS= read -r file; do
            echo "    ${file##*/}: $(sha256sum "${file}" | cut -d " " -f 1)" >> ${{ github.workspace }}/CHECKSUMS.txt
          done < "${{ github.workspace }}/release-assets.txt"

      - name: Create Release 🛫
        if: fromJSON(steps.check.outputs.validTag)
        id: create_release
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          draft: true
          prerelease: ${{ fromJSON(steps.check.outputs.prerelease) }}
          tag_name: ${{ steps.check.outputs.version }}
          name: ${{ needs.build-project.outputs.pluginName }} ${{ steps.check.outputs.version }}
          body_path: ${{ github.workspace }}/CHECKSUMS.txt
          files: ${{ steps.assets.outputs.files }}
